<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body,
        #editor {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .editor-error {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: red;
            font: 16px sans-serif;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="editor"></div>
    <div id="editor-error" class="editor-error">
        <p>Monaco editor failed to load from CDN.</p>
        <p>Please check your network connection.</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
    <script>
        (function () {
            var defaultXaml = `<StackPanel 
    xmlns="http://schemas.microsoft.com/winfx/2006/xaml/presentation" 
    HorizontalAlignment="Center" 
    VerticalAlignment="Center">
    <TextBlock 
        Text="Hello, XAML Studio!" 
        FontSize="24"/>
    <Button 
        Content="Click Me" 
        Margin="0,20,0,0"/>
</StackPanel>`;
            var cdnBase = "https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs";
            require.config({ paths: { vs: cdnBase } });
            var loadTimeout = setTimeout(function () {
                if (typeof monaco === "undefined") {
                    document.getElementById("editor-error").style.display = "block";
                    if (window.chrome && window.chrome.webview) {
                        window.chrome.webview.postMessage("__ERROR__: Monaco CDN failed to load");
                    }
                }
            }, 15000);
            require(["vs/editor/editor.main"], function () {
                clearTimeout(loadTimeout);
                var editor = monaco.editor.create(document.getElementById("editor"), {
                    value: defaultXaml, language: "xml", theme: "vs",
                    minimap: { enabled: false }, lineNumbers: "on",
                    automaticLayout: true, fontSize: 14
                });
                var debounceTimer = null;
                editor.onDidChangeModelContent(function () {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(function () {
                        var content = editor.getValue();
                        if (window.chrome && window.chrome.webview) {
                            window.chrome.webview.postMessage(content);
                        }
                    }, 300);
                });
                // Post initial content
                setTimeout(function () {
                    if (window.chrome && window.chrome.webview) {
                        window.chrome.webview.postMessage(defaultXaml);
                    }
                }, 500);
            });
        })();
    </script>
</body>

</html>
